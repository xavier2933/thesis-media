<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Mission Planner — Log Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #161c2b;
    --border: #1e2840;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --success: #22d3a0;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #c8d6ef;
    --muted: #4a5878;
    --dim: #2a3450;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    padding: 2rem;
  }

  .meta-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 8px;
  }

  .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
  .value { font-family: 'Space Mono', monospace; font-size: 1.25rem; color: var(--accent); }

  #map-container {
    padding: 0 2rem;
    margin-bottom: 2rem;
  }

  svg {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .site-node { fill: var(--dim); stroke: var(--border); stroke-width: 2; }
  .site-node.deployed { fill: var(--success); stroke: #fff; }
  .site-label { font-size: 10px; fill: var(--muted); font-family: 'Space Mono', monospace; }
  .site-label.deployed { fill: #fff; }

  /* Timeline Styles */
  .timeline { padding: 0 2rem 4rem; }
  .timeline-row { margin-bottom: 3rem; }
  .row-header { 
    display: flex; 
    align-items: center; 
    gap: 1rem; 
    margin-bottom: 1.5rem;
    border-left: 4px solid var(--accent);
    padding-left: 1rem;
  }
  .row-label { font-weight: 800; font-size: 1.5rem; }

  .site-group { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
  .site-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: bold;
    margin-bottom: 0.5rem;
  }
  .row0 { background: var(--accent); color: #000; }
  .row1 { background: var(--accent2); color: #fff; }
  .row2 { background: #3b82f6; color: #fff; }
  .row3 { background: #ec4899; color: #fff; }

  .step {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .step:hover { border-color: var(--accent); }
  .step-header { display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 0.9rem; }
  .fn-name { color: var(--accent); font-weight: bold; }
  .step-reasoning { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.4; }
  
  .step-detail { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 0.8rem; white-space: pre-wrap; color: #aaa; }
  .step.expanded .step-detail { display: block; }

  .expand-hint { font-size: 0.7rem; color: var(--dim); text-align: center; margin-top: 5px; }
</style>
</head>
<body>

<header>
  <h1>LLM MISSION LOG <span id="mission-id" style="color:var(--accent)">-</span></h1>
  <div id="controls">
    <input type="file" id="file-input" style="display:none">
    <button onclick="document.getElementById('file-input').click()" style="padding: 0.5rem 1rem; background: var(--accent); border:none; cursor:pointer; font-weight:bold; border-radius:4px;">LOAD MISSION JSON</button>
  </div>
</header>

<div class="meta-grid" id="meta">
  </div>

<div id="map-container">
  <svg id="missionMap" viewBox="0 0 620 230"></svg>
</div>

<div class="timeline" id="timeline">
  </div>

<script>
  const fileInput = document.getElementById('file-input');
  
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (event) => {
      const data = JSON.parse(event.target.result);
      renderAll(data);
    };
    reader.readAsText(file);
  });

  function renderAll(data) {
    renderMeta(data);
    renderMap(data);
    renderTimeline(data);
  }

  function renderMeta(data) {
    const meta = document.getElementById('meta');
    const stats = data.mission_stats || {};
    const totalSites = data.deployed_sites ? data.deployed_sites.length : 0;
    
    meta.innerHTML = `
      <div class="meta-card"><div class="label">Duration</div><div class="value">${stats.duration_s || '?'}s</div></div>
      <div class="meta-card"><div class="label">Sites Deployed</div><div class="value">${totalSites} / 16</div></div>
      <div class="meta-card"><div class="label">Total Tokens</div><div class="value">${(stats.tokens?.total / 1000).toFixed(1)}k</div></div>
      <div class="meta-card"><div class="label">Iterations</div><div class="value">${stats.iterations || '?'}</div></div>
    `;
    document.getElementById('mission-id').innerText = data.timestamp || 'LOG';
  }

  function renderMap(data) {
    const svg = document.getElementById('missionMap');
    svg.innerHTML = '';
    
    // Deployment Grid: 4 rows of 4 sites in S-pattern
    const totalSitesExpected = 16;
    const sites = data.deployed_sites || [];
    
    for (let i = 1; i <= totalSitesExpected; i++) {
      const isDeployed = sites.includes(i);
      
      // Calculate layout coordinates for 4x4 S-pattern
      const row = Math.floor((i - 1) / 4);
      const pos = (i - 1) % 4;
      const isEvenRow = row % 2 === 0;
      
      // Flip X coordinate for odd rows to create the "S"
      const x = 60 + (isEvenRow ? pos * 120 : (3 - pos) * 120);
      const y = 30 + (row * 50);

      // Draw Site
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      circle.setAttribute("cx", x);
      circle.setAttribute("cy", y);
      circle.setAttribute("r", 15);
      circle.setAttribute("class", `site-node ${isDeployed ? 'deployed' : ''}`);
      svg.appendChild(circle);

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", x);
      text.setAttribute("y", y + 4);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("class", `site-label ${isDeployed ? 'deployed' : ''}`);
      text.textContent = i;
      svg.appendChild(text);
    }
  }

  function groupBySite(data) {
    const sites = {};
    const messages = data.messages || [];
    
    messages.forEach(msg => {
      if (msg.role !== 'assistant' || !msg.tool_calls) return;
      
      msg.tool_calls.forEach(tc => {
        const fn = tc.function.name;
        const args = JSON.parse(tc.function.arguments);
        const reasoning = msg.content;

        // Try to find the result in the next message
        const resultMsg = messages.find(m => m.tool_call_id === tc.id);
        const result = resultMsg ? JSON.parse(resultMsg.content) : null;

        if (['get_site_waypoints', 'deploy_antenna', 'stop_rope', 'validate_deployment'].includes(fn)) {
          const siteId = args.site_id;
          if (!sites[siteId]) {
            sites[siteId] = {
              id: siteId,
              row: Math.floor((siteId - 1) / 4),
              steps: []
            };
          }
          sites[siteId].steps.push({ fn, args, result, reasoning });
        }
      });
    });
    return sites;
  }

  function renderTimeline(data) {
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';
    const siteData = groupBySite(data);
    
    const rows = { 0: [], 1: [], 2: [], 3: [] };
    Object.values(siteData).forEach(s => {
      if (rows[s.row]) rows[s.row].push(s);
    });

    Object.keys(rows).forEach(rowIdx => {
      const siteList = rows[rowIdx].sort((a, b) => a.id - b.id);
      if (siteList.length === 0) return;

      const el = document.createElement('div');
      el.className = 'timeline-row';
      const headerHtml = `
        <div class="row-header">
          <div class="row-label">Row ${rowIdx}</div>
          <div class="row-stats">${siteList.length} sites</div>
        </div>
      `;

      let sitesHtml = '<div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 2rem;">';
      siteList.forEach(site => {
        sitesHtml += `<div class="site-group">
          <div><span class="site-badge row${rowIdx}">SITE ${site.id}</span></div>
          ${site.steps.map(step => `
            <div class="step" onclick="this.classList.toggle('expanded')">
              <div class="step-header">
                <span class="fn-name">${step.fn}()</span>
                <span style="color:${step.result?.success ? 'var(--success)' : 'var(--danger)'}">${step.result?.success ? 'OK' : 'FAIL'}</span>
              </div>
              <div class="step-reasoning">${step.reasoning}</div>
              <div class="expand-hint">↕ details</div>
              <div class="step-detail">ARGS: ${JSON.stringify(step.args, null, 2)}\n\nRESULT: ${JSON.stringify(step.result, null, 2)}</div>
            </div>
          `).join('')}
        </div>`;
      });
      sitesHtml += '</div>';

      el.innerHTML = headerHtml + sitesHtml;
      timeline.appendChild(el);
    });
  }
</script>

</body>
</html>
