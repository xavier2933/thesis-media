<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Mission Planner — Log Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #161c2b;
    --border: #1e2840;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --success: #22d3a0;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #c8d6ef;
    --muted: #4a5878;
    --dim: #2a3450;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }

  .title-block h1 span { color: var(--accent); }

  .title-block .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .meta-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .pill .label { color: var(--text); font-weight: 700; }
  .pill.success .label { color: var(--success); }
  .pill.info .label { color: var(--accent); }

  /* ── Stats Row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .stat-card.success::after { background: var(--success); }
  .stat-card.warn::after { background: var(--warn); }
  .stat-card.purple::after { background: var(--accent2); }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }

  .stat-card.success .stat-value { color: var(--success); }
  .stat-card.warn .stat-value { color: var(--warn); }

  /* ── S-pattern Map ── */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .map-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 36px;
    overflow-x: auto;
  }

  svg.mission-map {
    display: block;
    min-width: 560px;
    width: 100%;
    height: auto;
  }

  /* ── Timeline ── */
  .timeline { position: relative; }

  .step-group {
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .step-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .site-badge {
    background: var(--accent2);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .site-badge.row0 { background: #0e4f8e; border: 1px solid #1a7cd4; color: #7dd3fa; }
  .site-badge.row1 { background: #3b1f6e; border: 1px solid #7c3aed; color: #c4b5fd; }
  .site-badge.row2 { background: #0e5e4a; border: 1px solid #10b981; color: #6ee7b7; }
  .site-badge.row3 { background: #5e3a0e; border: 1px solid #f59e0b; color: #fcd34d; }

  .step-group-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
  }

  .step-list {
    border-left: 2px solid var(--border);
    margin-left: 6px;
    padding-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 12px 14px;
    position: relative;
    transition: border-color 0.15s;
  }

  .step::before {
    content: '';
    position: absolute;
    left: -27px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--dim);
    border: 2px solid var(--border);
  }

  .step.success::before { background: var(--success); border-color: var(--success); }
  .step.error::before { background: var(--danger); border-color: var(--danger); }

  .step:hover {
    border-color: var(--accent);
    cursor: pointer;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .fn-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 700;
  }

  .step-status {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: auto;
  }

  .step-status.ok { background: rgba(34,211,160,0.12); color: var(--success); border: 1px solid rgba(34,211,160,0.25); }
  .step-status.fail { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }

  .step-reasoning {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .step-detail {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: #5a7090;
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--dim);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .step.expanded .step-detail { display: block; }
  .step.expanded { border-color: var(--accent); }

  .expand-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    text-align: right;
    margin-top: 2px;
  }

  /* Special steps */
  .step.transition {
    background: rgba(124,58,237,0.07);
    border-color: rgba(124,58,237,0.3);
  }

  .step.transition::before { background: var(--accent2); border-color: var(--accent2); }
  .step.transition .fn-name { color: var(--accent2); }

  .step.complete {
    background: rgba(0,229,255,0.04);
    border-color: rgba(0,229,255,0.2);
  }
  .step.complete .fn-name { color: var(--accent); }

  /* ── Upload zone ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 36px;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(0,229,255,0.03); }

  .upload-zone p { color: var(--muted); font-size: 0.9rem; margin-top: 10px; }
  .upload-zone .upload-icon { font-size: 2.5rem; opacity: 0.4; }
  .upload-zone .upload-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
  }
  .upload-zone .upload-btn:hover { background: var(--dim); }

  #fileInput { display: none; }

  .error-msg {
    color: var(--danger);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 10px;
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 5px;
    margin-bottom: 16px;
  }

  .toggle-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .toggle-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 5px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-btn.active { background: rgba(0,229,255,0.08); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div class="title-block">
        <h1>Mission <span>Log</span> Viewer</h1>
        <div class="subtitle">LLM Autonomous Task Planner · Visual Debugger</div>
      </div>
    </div>
    <div class="meta-pills" id="metaPills"></div>
  </header>

  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📡</div>
    <p>Drop a mission log JSON file here, or click to browse</p>
    <p style="font-size:0.75rem; margin-top:4px; color: var(--dim)">The page is pre-loaded with a sample log — upload your own to replace it</p>
    <label class="upload-btn" for="fileInput">Choose File</label>
    <input type="file" id="fileInput" accept=".json">
  </div>
  <div id="errorMsg" class="error-msg" style="display:none"></div>

  <div id="statsRow" class="stats-row"></div>

  <div class="section-label" id="mapLabel" style="display:none">Mission Map</div>
  <div class="map-wrap" id="mapWrap" style="display:none">
    <svg class="mission-map" id="missionMap" viewBox="0 0 620 130" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="section-label" id="timelineLabel" style="display:none">
    Execution Timeline
    <span style="color: var(--text); font-size:0.75rem; font-family: 'Syne', sans-serif; text-transform:none; letter-spacing:0; margin-left:4px">(click any step to expand)</span>
  </div>
  <div class="toggle-bar" id="toggleBar" style="display:none">
    <button class="toggle-btn active" onclick="filterSteps('all', this)">All Steps</button>
    <button class="toggle-btn" onclick="filterSteps('nav', this)">Navigation</button>
    <button class="toggle-btn" onclick="filterSteps('rope', this)">Rope Ops</button>
    <button class="toggle-btn" onclick="filterSteps('other', this)">Planning</button>
  </div>
  <div class="timeline" id="timeline"></div>

</div>

// ── State ──
let currentFilter = 'all';
let renderedGroups = [];

// ── Upload ──
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      showError('');
      renderLog(data);
    } catch(err) {
      showError('Could not parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── Parse conversation into structured steps ──
function parseConversation(conv) {
  // Build a map of tool_call_id -> tool result
  const toolResults = {};
  conv.forEach(msg => {
    if (msg.role === 'tool' && msg.tool_call_id) {
      try { toolResults[msg.tool_call_id] = JSON.parse(msg.content); }
      catch { toolResults[msg.tool_call_id] = { raw: msg.content }; }
    }
  });

  const steps = [];
  conv.forEach(msg => {
    if (msg.role === 'assistant' && msg.tool_calls) {
      msg.tool_calls.forEach(tc => {
        const fn = tc.function.name;
        let args = {};
        try { args = JSON.parse(tc.function.arguments); } catch {}
        const result = toolResults[tc.id] || {};
        steps.push({
          fn,
          args,
          result,
          reasoning: msg.content || '',
          success: result.success !== false,
          id: tc.id
        });
      });
    }
  });
  return steps;
}

// ── Group steps by site ──
function groupBySite(steps) {
  const groups = [];
  let currentGroup = null;
  let globalIdx = 0;

  steps.forEach((step, i) => {
    const fn = step.fn;
    const siteId = step.args?.site_id || extractSiteFromResult(step.result);

    if ((fn === 'get_site_waypoints' || fn === 'get_adjusted_site_waypoints') && siteId) {
      currentGroup = {
        site: siteId,
        row: Math.floor((siteId - 1) / 4),
        label: `Site ${siteId}`,
        steps: [],
        globalStart: globalIdx
      };
      groups.push(currentGroup);
    } else if (fn === 'turn_around') {
      currentGroup = { site: null, row: null, label: 'Row Transition', steps: [], globalStart: globalIdx, isTransition: true };
      groups.push(currentGroup);
    } else if (fn === 'mission_complete') {
      currentGroup = { site: null, row: null, label: 'Mission Complete', steps: [], globalStart: globalIdx, isComplete: true };
      groups.push(currentGroup);
    }

    if (!currentGroup) {
      currentGroup = { site: null, row: null, label: 'Pre-Mission', steps: [], globalStart: 0, isPre: true };
      groups.push(currentGroup);
    }

    currentGroup.steps.push({ ...step, globalIdx });
    globalIdx++;
  });

  return groups;
}

function extractSiteFromResult(result) {
  if (result?.deployed_sites?.length) return result.deployed_sites[result.deployed_sites.length - 1];
  return null;
}

// ── Render ──
function renderLog(data) {
  renderMeta(data);
  renderStats(data);
  renderMap(data);
  const steps = parseConversation(data.conversation || []);
  renderedGroups = groupBySite(steps);
  renderTimeline();
  document.getElementById('mapLabel').style.display = '';
  document.getElementById('mapWrap').style.display = '';
  document.getElementById('timelineLabel').style.display = '';
  document.getElementById('toggleBar').style.display = '';
}

function renderMeta(data) {
  const pills = document.getElementById('metaPills');
  const ts = data.timestamp || '';
  const friendly = ts ? ts.replace(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/, '$1-$2-$3 $4:$5:$6') : 'Unknown';
  pills.innerHTML = `
    <div class="pill info"><span>MODEL</span><span class="label">${data.model || 'unknown'}</span></div>
    <div class="pill"><span>TIMESTAMP</span><span class="label">${friendly}</span></div>
    <div class="pill success"><span>DEPLOYED</span><span class="label">${(data.deployed_sites||[]).length} / ${(data.total_sites || [...new Set([...(data.deployed_sites||[]),(data.aborted_sites||[])])].length || 16)} sites</span></div>
    <div class="pill"><span>ABORTED</span><span class="label">${(data.aborted_sites||[]).length}</span></div>
    <div class="pill"><span>OBSTACLES</span><span class="label">${(data.obstacles||[]).length}</span></div>
  `;
}

function renderStats(data) {
  const conv = data.conversation || [];
  let toolCalls = 0, successes = 0, failures = 0;
  conv.forEach(m => {
    if (m.role === 'tool') {
      toolCalls++;
      try {
        const r = JSON.parse(m.content);
        if (r.success === false) failures++; else successes++;
      } catch { successes++; }
    }
  });

  const row = document.getElementById('statsRow');
  row.innerHTML = `
    <div class="stat-card success">
      <div class="stat-label">Deployed</div>
      <div class="stat-value">${(data.deployed_sites||[]).length}</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">Aborted</div>
      <div class="stat-value">${(data.aborted_sites||[]).length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tool Calls</div>
      <div class="stat-value">${toolCalls}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Successes</div>
      <div class="stat-value" style="color:var(--success)">${successes}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Failures</div>
      <div class="stat-value" style="color:${failures>0?'var(--danger)':'var(--muted)'}">${failures}</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Obstacles</div>
      <div class="stat-value">${(data.obstacles||[]).length}</div>
    </div>
  `;
}

function renderMap(data) {
  const svg = document.getElementById('missionMap');
  const deployed = new Set(data.deployed_sites || []);
  const aborted  = new Set(data.aborted_sites  || []);

  // Layout: 4 rows × 4 sites = 16 sites
  // Rows alternate direction: row 0 +X, row 1 -X, row 2 +X, row 3 -X
  const COLS = 4, ROWS = 4;
  const PAD_LEFT = 56, PAD_RIGHT = 32, PAD_TOP = 14, PAD_BOT = 14;
  const ROW_GAP = 52;
  const W = 540;
  const siteW = W / COLS;
  const svgH = PAD_TOP + ROWS * ROW_GAP + PAD_BOT;

  // Row colours: pair of [lineColor, arrowColor, badgeBg, badgeFg]
  const rowStyles = [
    { line: '#0e4f8e', arrow: '#1a7cd4', label: 'ROW 0 +X' },
    { line: '#3b1f6e', arrow: '#7c3aed', label: 'ROW 1 -X' },
    { line: '#0e5e4a', arrow: '#10b981', label: 'ROW 2 +X' },
    { line: '#5e3a0e', arrow: '#f59e0b', label: 'ROW 3 -X' },
  ];

  // Update SVG viewBox to fit 4 rows
  svg.setAttribute('viewBox', `0 0 ${PAD_LEFT + W + PAD_RIGHT + 28} ${svgH}`);

  let html = '';

  // Vertical grid lines
  for (let i = 0; i <= COLS; i++) {
    const x = PAD_LEFT + i * siteW;
    html += `<line x1="${x}" y1="${PAD_TOP - 6}" x2="${x}" y2="${svgH - PAD_BOT + 6}" stroke="#1e2840" stroke-width="1"/>`;
  }

  // Draw each row
  for (let r = 0; r < ROWS; r++) {
    const plusX = (r % 2 === 0);           // true = left→right, false = right→left
    const rowY  = PAD_TOP + r * ROW_GAP + ROW_GAP / 2;
    const style = rowStyles[r];

    // Row direction line
    html += `<line x1="${PAD_LEFT}" y1="${rowY}" x2="${PAD_LEFT + W}" y2="${rowY}" stroke="${style.line}" stroke-width="1.5" stroke-dasharray="4 3"/>`;

    // Direction arrow
    if (plusX) {
      html += `<polygon points="${PAD_LEFT+W+3},${rowY} ${PAD_LEFT+W-5},${rowY-4} ${PAD_LEFT+W-5},${rowY+4}" fill="${style.arrow}"/>`;
    } else {
      html += `<polygon points="${PAD_LEFT-3},${rowY} ${PAD_LEFT+5},${rowY-4} ${PAD_LEFT+5},${rowY+4}" fill="${style.arrow}"/>`;
    }

    // Row label (left side, rotated)
    html += `<text x="10" y="${rowY+3}" fill="#4a5878" font-family="Space Mono,monospace" font-size="7" text-anchor="middle" transform="rotate(-90,10,${rowY})">${style.label}</text>`;

    // Sites for this row: ids 1-4, 5-8, 9-12, 13-16
    const siteStart = r * COLS + 1;
    for (let c = 0; c < COLS; c++) {
      const sId = siteStart + c;
      // column position follows travel direction
      const col = plusX ? c : (COLS - 1 - c);
      const cx = PAD_LEFT + (col + 0.5) * siteW;

      const color  = deployed.has(sId) ? '#22d3a0' : aborted.has(sId) ? '#ef4444' : '#2a3450';
      const stroke = deployed.has(sId) ? '#22d3a0' : aborted.has(sId) ? '#ef4444' : '#1e2840';

      html += `<circle cx="${cx}" cy="${rowY}" r="10" fill="${color}22" stroke="${stroke}" stroke-width="1.5"/>`;
      html += `<text x="${cx}" y="${rowY+4}" text-anchor="middle" fill="${color}" font-family="Space Mono,monospace" font-size="9" font-weight="700">${sId}</text>`;

      // checkmark above or below depending on row
      if (deployed.has(sId)) {
        const tickY = plusX ? rowY + 20 : rowY - 16;
        html += `<text x="${cx}" y="${tickY}" text-anchor="middle" fill="#22d3a0" font-family="Space Mono,monospace" font-size="7">✓</text>`;
      }
    }

    // U-turn connector to next row (right side for even rows, left side for odd)
    if (r < ROWS - 1) {
      const nextY = PAD_TOP + (r + 1) * ROW_GAP + ROW_GAP / 2;
      if (plusX) {
        // U-turn on right
        const uX = PAD_LEFT + W + 8;
        html += `<path d="M${uX-3},${rowY} Q${uX+18},${rowY} ${uX+18},${(rowY+nextY)/2} Q${uX+18},${nextY} ${uX-3},${nextY}" stroke="${style.arrow}" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>`;
      } else {
        // U-turn on left
        const uX = PAD_LEFT - 8;
        html += `<path d="M${uX+3},${rowY} Q${uX-18},${rowY} ${uX-18},${(rowY+nextY)/2} Q${uX-18},${nextY} ${uX+3},${nextY}" stroke="${style.arrow}" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>`;
      }
    }
  }

  svg.innerHTML = html;
}

function fnCategory(fn) {
  if (['navigate_to_waypoint', 'go_around_obstacle'].includes(fn)) return 'nav';
  if (['start_rope','stop_rope','abort_site'].includes(fn)) return 'rope';
  return 'other';
}

function fnIcon(fn) {
  const icons = {
    navigate_to_waypoint: '🚀',
    start_rope: '🔗',
    stop_rope: '⛔',
    abort_site: '🚨',
    pick_and_place: '🦾',
    get_adjusted_site_waypoints: '📍',
    turn_around: '↩️',
    mission_complete: '🏁',
    go_around_obstacle: '⚠️'
  };
  return icons[fn] || '⚙️';
}

function renderTimeline() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  renderedGroups.forEach((group, gi) => {
    const visible = group.steps.some(s => stepMatchesFilter(s));
    if (!visible) return;

    const el = document.createElement('div');
    el.className = 'step-group';
    el.style.animationDelay = `${gi * 0.04}s`;

    const ROW_DIRS = ['+X direction', '-X direction', '+X direction', '-X direction'];
    let badgeClass = group.row !== null ? `row${group.row}` : '';
    let badgeText = group.label;

    let headerHtml = `
      <div class="step-group-header">
        <span class="site-badge ${badgeClass}">${badgeText}</span>
        ${group.isTransition ? '<span class="step-group-title">U-turn to next row</span>' : ''}
        ${group.isComplete ? '<span class="step-group-title" style="color:var(--accent)">All sites finalized</span>' : ''}
        ${group.site ? `<span class="step-group-title">Row ${group.row} (${ROW_DIRS[group.row] || ''})</span>` : ''}
      </div>
    `;

    let stepsHtml = '<div class="step-list">';
    group.steps.forEach(step => {
      if (!stepMatchesFilter(step)) return;
      const ok = step.success;
      const cat = fnCategory(step.fn);
      const extraClass = step.fn === 'turn_around' ? 'transition' : step.fn === 'mission_complete' ? 'complete' : '';

      const resultStr = JSON.stringify(step.result, null, 2);
      const argsStr = JSON.stringify(step.args, null, 2);

      stepsHtml += `
        <div class="step ${ok ? 'success' : 'error'} ${extraClass}" data-cat="${cat}" onclick="this.classList.toggle('expanded')">
          <div class="step-header">
            <span>${fnIcon(step.fn)}</span>
            <span class="fn-name">${step.fn}()</span>
            <span class="step-status ${ok ? 'ok' : 'fail'}">${ok ? 'OK' : 'FAIL'}</span>
          </div>
          ${step.reasoning ? `<div class="step-reasoning">${escHtml(step.reasoning)}</div>` : ''}
          <div class="expand-hint">↕ click to expand</div>
          <div class="step-detail"><b>ARGS:</b>\n${escHtml(argsStr)}\n\n<b>RESULT:</b>\n${escHtml(resultStr)}</div>
        </div>
      `;
    });
    stepsHtml += '</div>';

    el.innerHTML = headerHtml + stepsHtml;
    timeline.appendChild(el);
  });
}

function stepMatchesFilter(step) {
  if (currentFilter === 'all') return true;
  return fnCategory(step.fn) === currentFilter;
}

function filterSteps(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init with sample ──
renderLog(SAMPLE);
</script>
